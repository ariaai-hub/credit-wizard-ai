name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: |
          echo "=== BUILD START ==="
          npm run build 2>&1
          BUILD_EXIT=$?
          echo "=== BUILD EXIT CODE: $BUILD_EXIT ==="
          exit $BUILD_EXIT

  smoke-test:
    runs-on: ubuntu-latest
    needs: [typecheck-and-build]
    steps:
      - name: Smoke test key routes
        run: |
          echo "Testing production deployment..."
          STATUS1=$(curl -s -o /dev/null -w "%{http_code}" https://credit-lounge-academy.vercel.app/get-started)
          echo "/get-started: $STATUS1"
          STATUS2=$(curl -s -o /dev/null -w "%{http_code}" https://credit-lounge-academy.vercel.app/pricing)
          echo "/pricing: $STATUS2"
          STATUS3=$(curl -s -o /dev/null -w "%{http_code}" https://credit-lounge-academy.vercel.app/)
          echo "/: $STATUS3"
          if [ "$STATUS1" != "200" ] || [ "$STATUS2" != "200" ] || [ "$STATUS3" != "200" ]; then exit 1; fi

  deploy-preview:
    runs-on: ubuntu-latest
    needs: [typecheck-and-build]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          github-comment: true