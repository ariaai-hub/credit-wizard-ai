<svg width="1200" height="780" viewBox="0 0 1200 780" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="780" rx="40" fill="#07111F"/>
  <rect x="36" y="36" width="1128" height="708" rx="32" fill="url(#bg)" stroke="rgba(148,163,184,0.2)"/>

  <text x="88" y="126" fill="#93C5FD" font-family="Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2">CLIENT WIN VISUALS</text>
  <text x="88" y="176" fill="white" font-family="Arial, sans-serif" font-size="40" font-weight="700">Status updates people actually want to receive</text>

  <rect x="88" y="224" width="300" height="208" rx="28" fill="#0B2A49" stroke="#2563EB"/>
  <text x="120" y="270" fill="#BFDBFE" font-family="Arial, sans-serif" font-size="16" font-weight="700">SCORE MOVEMENT</text>
  <text x="120" y="338" fill="white" font-family="Arial, sans-serif" font-size="78" font-weight="700">+34</text>
  <text x="120" y="382" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="22">points since the last review</text>

  <rect x="416" y="224" width="300" height="208" rx="28" fill="#102B1E" stroke="#22C55E"/>
  <text x="448" y="270" fill="#BBF7D0" font-family="Arial, sans-serif" font-size="16" font-weight="700">DELETIONS RECORDED</text>
  <text x="448" y="338" fill="white" font-family="Arial, sans-serif" font-size="78" font-weight="700">2</text>
  <text x="448" y="382" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="22">items removed from the file</text>

  <rect x="744" y="224" width="368" height="208" rx="28" fill="#0E2038" stroke="#334155"/>
  <text x="776" y="270" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="26" font-weight="700">Funding-ready alert</text>
  <text x="776" y="316" fill="#94A3B8" font-family="Arial, sans-serif" font-size="19">
    <tspan x="776" dy="0">When a file reaches the right point,</tspan>
    <tspan x="776" dy="24">the client can be notified automatically</tspan>
    <tspan x="776" dy="24">instead of waiting for a manual call.</tspan>
  </text>

  <rect x="88" y="474" width="1024" height="206" rx="28" fill="#091523" stroke="#334155"/>

  <rect x="128" y="514" width="292" height="130" rx="22" fill="#0F2747" stroke="#2563EB"/>
  <text x="156" y="556" fill="#BFDBFE" font-family="Arial, sans-serif" font-size="16" font-weight="700">WIN UPDATE</text>
  <text x="156" y="590" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="18">
    <tspan x="156" dy="0">Congratulations. Your file just</tspan>
    <tspan x="156" dy="24">posted a positive result.</tspan>
  </text>

  <rect x="454" y="514" width="292" height="130" rx="22" fill="#0F2747" stroke="#2563EB"/>
  <text x="482" y="556" fill="#BFDBFE" font-family="Arial, sans-serif" font-size="16" font-weight="700">MAILED UPDATE</text>
  <text x="482" y="590" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="18">
    <tspan x="482" dy="0">Your dispute package has been</tspan>
    <tspan x="482" dy="24">mailed and logged to your file.</tspan>
  </text>

  <rect x="780" y="514" width="292" height="130" rx="22" fill="#0F2747" stroke="#2563EB"/>
  <text x="808" y="556" fill="#BFDBFE" font-family="Arial, sans-serif" font-size="16" font-weight="700">RESULTS UPDATE</text>
  <text x="808" y="590" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="18">
    <tspan x="808" dy="0">New results are in and your</tspan>
    <tspan x="808" dy="24">progress has been updated.</tspan>
  </text>

  <defs>
    <linearGradient id="bg" x1="36" y1="36" x2="1164" y2="744" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1730"/>
      <stop offset="1" stop-color="#102343"/>
    </linearGradient>
  </defs>
</svg>
